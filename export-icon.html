      <h3>Splash Screen</h3>
      <p>1284 x 2778</p>
    </div>
  </div>

  <div>
    <button onclick="downloadIcon()">Download icon.png (1024x1024)</button>
    <button onclick="downloadAdaptive()">Download adaptive-icon.png (1024x1024)</button>
    <button onclick="downloadSplash()">Download splash.png (1284x2778)</button>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    function svgToCanvas(svgElement, width, height) {
      return new Promise((resolve) => {
        const canvas = document.getElementById('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        const svgData = new XMLSerializer().serializeToString(svgElement);
        const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0, width, height);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL('image/png'));
        };
        img.src = url;
      });
    }

    async function downloadIcon() {
      const svg = document.getElementById('icon-svg');
      const dataUrl = await svgToCanvas(svg, 1024, 1024);
      download(dataUrl, 'icon.png');
    }

    async function downloadAdaptive() {
      const svg = document.getElementById('icon-svg');
      const dataUrl = await svgToCanvas(svg, 1024, 1024);
      download(dataUrl, 'adaptive-icon.png');
    }

    async function downloadSplash() {
      const svg = document.getElementById('splash-svg');
      const dataUrl = await svgToCanvas(svg, 1284, 2778);
      download(dataUrl, 'splash.png');
    }

    function download(dataUrl, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataUrl;
      link.click();
    }
  </script>
</body>
</html>
